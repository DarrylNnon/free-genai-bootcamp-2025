AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Day 13 Project: An advanced SIEM Log Analyzer that uses GPT to analyze logs,
  classify severity with CVSS, and provide actionable alerts in a structured JSON format.

Parameters:
  OpenAIAPIKey:
    Type: String
    Description: Your OpenAI API Key.
    NoEcho: true

Globals:
  Function:
    Timeout: 60
    MemorySize: 256

Resources:
  # This is the Lambda function that contains the core logic
  LogAnalyzerFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Zip
      CodeUri: src/
      Handler: lambda_function.handler
      Runtime: python3.11
      Architectures:
        - x86_64
      FunctionName: Day13-SIEM-Log-Analyzer-Function
      Description: Receives logs from CloudWatch, analyzes them with GPT for threats, and logs a structured analysis.
      Environment:
        Variables:
          OPENAI_API_KEY: !Ref OpenAIAPIKey
      Policies:
        # Give the Lambda permission to write its own logs to CloudWatch
        - CloudWatchPutMetricPolicy: {}

  # This is the CloudWatch Log Group that our Lambda function will write its output to.
  # SAM creates this implicitly, but we can access its name.
  # The name will be /aws/lambda/Day13-SIEM-Log-Analyzer-Function

  # This is the CloudWatch Log Group that we will monitor for incoming logs.
  MonitoredLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /siem/day13/monitored-logs
      RetentionInDays: 7

  # This is the subscription filter that triggers the Lambda function.
  # It watches the MonitoredLogGroup for any new log messages.
  LogSubscriptionFilter:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      LogGroupName: !Ref MonitoredLogGroup
      FilterPattern: "" # Empty pattern matches all log events
      DestinationArn: !GetAtt LogAnalyzerFunction.Arn

  # This permission allows CloudWatch Logs to invoke our Lambda function.
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LogAnalyzerFunction.Arn
      Action: lambda:InvokeFunction
      Principal: !Sub "logs.${AWS::Region}.amazonaws.com"
      SourceArn: !GetAtt MonitoredLogGroup.Arn