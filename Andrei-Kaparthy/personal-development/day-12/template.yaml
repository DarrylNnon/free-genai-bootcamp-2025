AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Day 12 Project: An AI-powered SIEM log analyzer that ingests logs from CloudWatch,
  analyzes them with a GPT model, and logs the results.

Parameters:
  OpenAIAPIKey:
    Type: String
    NoEcho: true
    Description: "Required. Your secret API key for the OpenAI service."
    MinLength: 1

Resources:
  # The Lambda function that contains the analysis logic
  LogAnalyzerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-LogAnalyzerFunction"
      Description: Receives logs from a monitored CloudWatch Log Group, sends them to an LLM for analysis, and logs the report.
      CodeUri: src/
      Handler: lambda_function.handler
      Runtime: python3.9
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          OPENAI_API_KEY: !Ref OpenAIAPIKey
      # SAM automatically creates an IAM Role for this function.
      # The AWSLambdaBasicExecutionRole policy is included by default,
      # allowing the function to write logs to its own CloudWatch Log Group.
      Events:
        # This is the crucial part that connects the MonitoredLogGroup to our function.
        # SAM will automatically create the AWS::Logs::SubscriptionFilter and the
        # necessary AWS::Lambda::Permission for CloudWatch Logs to invoke this function.
        LogProcessingTrigger:
          Type: CloudWatchLogs
          Properties:
            LogGroupName: !Ref MonitoredLogGroup
            FilterPattern: "" # An empty filter pattern matches all log events.

  # The CloudWatch Log Group that our application/service would write to.
  # We will monitor this log group for new entries.
  MonitoredLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      # The log group name is derived from the stack name for uniqueness.
      LogGroupName: !Sub "/sam/${AWS::StackName}/MonitoredLogGroup"
      RetentionInDays: 7

Outputs:
  MonitoredLogGroupName:
    Description: "The name of the CloudWatch Log Group to send logs to for analysis."
    Value: !Ref MonitoredLogGroup
  LogAnalyzerFunctionLogs:
    Description: "The name of the CloudWatch Log Group for the analyzer function's output."
    Value: !Sub "/aws/lambda/${LogAnalyzerFunction}"