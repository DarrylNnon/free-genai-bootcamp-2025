<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IaC GPT Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">IaC GPT Assistant 🤖</div>
            <p class="subtitle">Your AI partner for generating secure, validated Infrastructure as Code.</p>
        </header>
        <main>
            <form id="iac-form">
                <label for="user-request">Describe the infrastructure you need:</label>
                <div class="textarea-wrapper">
                    <textarea id="user-request" name="request" rows="4" placeholder="e.g., 'A secure S3 bucket for private logs with versioning enabled'"></textarea>
                </div>
                <div class="example-prompts">
                    <span>Try an example:</span>
                    <button type="button" class="example-btn">Secure S3 Bucket</button>
                    <button type="button" class="example-btn">RDS Database</button>
                    <button type="button" class="example-btn">EC2 Security Group</button>
                </div>
                <button type="submit" id="generate-btn">
                    <span class="btn-text">Generate & Secure</span>
                </button>
            </form>

            <div id="result-container" class="hidden">
                <div id="loader" class="hidden">
                    <div class="spinner"></div>
                    <p>AI is thinking... Generating, scanning, and building your report.</p>
                </div>

                <div id="output-grid" class="hidden">
                    <div class="output-panel">
                        <div class="panel-header">
                            <h3>Generated Terraform Code</h3>
                            <button id="copy-code-btn">Copy Code</button>
                        </div>
                        <pre><code id="generated-code" class="language-terraform"></code></pre>
                    </div>
                    <div class="output-panel">
                        <div class="panel-header">
                            <h3>AI-Powered Security Report</h3>
                        </div>
                        <div id="report" class="report-content"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
