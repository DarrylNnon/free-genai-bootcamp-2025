<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IaC GPT Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>IaC GPT Assistant 🤖</h1>
            <p>Turn natural language into secure, validated Terraform code.</p>
        </header>
        <main>
            <form id="iac-form">
                <label for="user-request">Describe the infrastructure you need:</label>
                <textarea id="user-request" name="request" rows="4" placeholder="e.g., 'A secure S3 bucket for private logs with versioning enabled'"></textarea>
                <button type="submit">Generate Code</button>
            </form>
            <div id="result-container" class="hidden">
                <div id="loader" class="hidden">
                    <div class="spinner"></div>
                    <p>Generating, scanning, and reporting... this may take a moment.</p>
                </div>
                <div id="output">
                    <h2>Generated Code</h2>
                    <pre><code id="generated-code"></code></pre>
                    <h2>AI-Powered Report</h2>
                    <div id="report"></div>
                </div>
            </div>
        </main>
    </div>
    <script>
        document.getElementById('iac-form').addEventListener('submit', async function(event) {
            event.preventDefault();

            const userRequest = document.getElementById('user-request').value;
            const resultContainer = document.getElementById('result-container');
            const loader = document.getElementById('loader');
            const output = document.getElementById('output');
            const generatedCodeEl = document.getElementById('generated-code');
            const reportEl = document.getElementById('report');

            if (!userRequest.trim()) {
                alert('Please enter a request.');
                return;
            }

            // Show loader and hide previous results
            resultContainer.classList.remove('hidden');
            loader.classList.remove('hidden');
            output.classList.add('hidden');

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ request: userRequest }),
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'An unknown error occurred.');
                }

                const data = await response.json();

                // Display results
                generatedCodeEl.textContent = data.final_code || 'No code generated.';
                reportEl.innerHTML = data.report_html || '<p>No report generated.</p>';
                
                output.classList.remove('hidden');

            } catch (error) {
                reportEl.innerHTML = `<p class="error"><strong>Error:</strong> ${error.message}</p>`;
                output.classList.remove('hidden');
            } finally {
                loader.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
